<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
  :root{
    --blue:#4A90D9;--green:#5BA85B;--yellow:#E8A838;--purple:#9B59B6;
    --red:#E74C3C;--teal:#1ABC9C;--orange:#E67E22;
    --dark:#1a1a2e;--bg:#f4f5f9;--card:#fff;--border:#ebebeb;--muted:#a0a0a8;
    --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{height:100dvh;overflow:hidden;}
  body{height:100dvh;overflow:hidden;background:var(--bg);font-family:-apple-system,'Noto Sans TC',sans-serif;}
  #app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:680px;margin:0 auto;overflow:hidden;}
  #header{background:var(--card);border-bottom:2px solid var(--border);padding:calc(var(--safe-top) + 14px) 20px 0;flex-shrink:0;}
  #header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  #clock{font-size:46px;font-weight:900;color:var(--dark);font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1;}
  #date-label{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px;}
  #app-name{font-size:22px;font-weight:900;color:var(--dark);}
  #login-btn{padding:8px 16px;font-size:13px;font-weight:800;border-radius:10px;border:2px solid var(--border);background:#fff;color:#666;cursor:pointer;font-family:inherit;}
  #login-btn.logged-in{border-color:var(--green);color:var(--green);}
  #tabs{display:flex;}
  .tab{flex:1;padding:11px 4px;border:none;background:none;font-size:14px;font-weight:500;color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;font-family:inherit;}
  .tab.active{font-weight:800;color:var(--blue);border-bottom-color:var(--blue);}
  #content{flex:1;overflow-y:auto;padding:18px 16px calc(var(--safe-bot) + 20px);}
  .card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;}
  .card-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
  .prog-bar-bg{background:#eee;border-radius:99px;height:12px;}
  .prog-bar-fill{height:12px;border-radius:99px;transition:width .4s;}
  .block-card{border-radius:18px;margin-bottom:14px;overflow:hidden;border:2px solid #eee;}
  .block-header{padding:14px 18px;display:flex;align-items:center;gap:12px;}
  .block-emoji{font-size:30px;}
  .block-title{font-size:20px;font-weight:900;color:#fff;}
  .block-time{font-size:13px;color:rgba(255,255,255,0.8);margin-top:2px;}
  .block-count{font-size:16px;font-weight:800;color:rgba(255,255,255,0.9);margin-left:auto;}
  .block-steps{padding:10px 14px 6px;}
  .step-btn{display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;width:100%;text-align:left;border:2px solid #e8e8e8;background:#fafafa;font-family:inherit;transition:all .15s;}
  .step-btn.done{background:#eafaf1;border-color:var(--green);}
  .step-check{width:26px;height:26px;border-radius:7px;flex-shrink:0;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;}
  .step-btn.done .step-check{background:var(--green);border-color:var(--green);color:#fff;}
  .step-label{font-size:17px;font-weight:600;color:#333;}
  .step-btn.done .step-label{color:var(--green);text-decoration:line-through;}

  /* Upload area */
  .upload-area{padding:10px 14px 14px;border-top:1px solid #f0f0f0;}
  .upload-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;margin-bottom:10px;}
  .upload-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .upload-btn{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:12px;border:2px solid var(--border);background:#fff;font-size:14px;font-weight:700;color:#555;cursor:pointer;font-family:inherit;}
  .upload-btn:active{opacity:.7;}
  .upload-note-area{width:100%;font-size:16px;border:2px solid var(--border);border-radius:12px;padding:10px 12px;outline:none;resize:none;color:var(--dark);font-family:inherit;margin-bottom:8px;}
  .upload-note-area:focus{border-color:var(--blue);}
  .save-note-btn{width:100%;padding:11px;font-size:15px;font-weight:800;border-radius:12px;border:none;cursor:pointer;font-family:inherit;}
  .upload-status{font-size:13px;color:var(--muted);margin-top:6px;min-height:18px;}
  .upload-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .preview-thumb{width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid var(--border);}

  textarea,input[type=text],input[type=time],input[type=number]{font-family:inherit;font-size:16px;border:2px solid var(--border);border-radius:12px;padding:12px 14px;width:100%;outline:none;color:var(--dark);background:#fff;resize:none;}
  textarea:focus,input:focus{border-color:var(--blue);}
  .one-thing-input{font-size:20px;font-weight:700;border:none;padding:0;border-radius:0;}
  .one-thing-input:focus{border:none;}
  .btn{width:100%;padding:14px;font-size:17px;font-weight:800;border-radius:16px;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s;}
  .btn:active{opacity:.8;}
  .btn-outline{background:#fff;border:2px solid currentColor;}
  .btn-row{display:flex;gap:10px;}
  .icon-btn{padding:8px 14px;font-size:13px;font-weight:800;border-radius:10px;border:2px solid var(--border);background:#fff;color:#666;cursor:pointer;font-family:inherit;}
  #timer-display{font-size:72px;font-weight:900;color:var(--dark);font-variant-numeric:tabular-nums;letter-spacing:4px;}
  #timer-phase{font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .timer-settings{display:flex;gap:12px;margin-top:16px;}
  .timer-settings>div{flex:1;text-align:center;}
  .timer-settings label{display:block;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
  .timer-settings input{text-align:center;font-size:20px;font-weight:800;padding:10px;}
  .ritual-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5;}
  .ritual-item:last-child{border-bottom:none;}
  .ritual-num{width:28px;height:28px;border-radius:8px;background:#f0f4ff;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--blue);font-size:14px;flex-shrink:0;}
  .ritual-text{font-size:17px;color:#333;flex:1;}
  .rec-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;margin-bottom:10px;}
  .rec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .rec-subject{font-size:14px;font-weight:700;}
  .rec-date{font-size:12px;color:var(--muted);}
  .rec-text{font-size:16px;color:#333;white-space:pre-wrap;line-height:1.5;}
  .rec-media{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .rec-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;border:2px solid var(--border);}
  .rec-audio{width:100%;margin-top:6px;}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filter-btn{padding:7px 14px;border-radius:99px;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:700;color:#888;cursor:pointer;font-family:inherit;white-space:nowrap;}
  .filter-btn.active{color:#fff;border-color:transparent;}
  .edit-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:14px;padding:12px 16px;margin-bottom:8px;cursor:pointer;border:2px solid var(--border);}
  .edit-row:active{opacity:.7;}
  .edit-emoji{font-size:24px;}
  .edit-info{flex:1;}
  .edit-name{font-size:16px;font-weight:700;color:var(--dark);}
  .edit-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .color-dot{width:16px;height:16px;border-radius:99px;flex-shrink:0;}
  .chevron{color:#ccc;font-size:18px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .section-title{font-size:17px;font-weight:800;color:var(--dark);}
  .day-card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;border:2px solid var(--border);}
  .day-card.today{border-color:var(--blue);}
  .day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .day-name{font-size:16px;font-weight:800;color:var(--dark);}
  .day-name.today-text{color:var(--blue);}
  .block-chip{display:flex;align-items:center;gap:8px;border-radius:10px;padding:8px 12px;margin-bottom:6px;cursor:pointer;border:1.5px solid transparent;}
  .block-chip-label{font-size:14px;font-weight:700;color:#333;}
  .block-chip-time{font-size:12px;color:var(--muted);}
  .no-blocks{font-size:13px;color:#ccc;text-align:center;padding:6px 0;}
  #modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  #modal-overlay.open{display:flex;}
  #modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:680px;max-height:88dvh;overflow-y:auto;padding:24px 20px calc(var(--safe-bot) + 32px);}
  .modal-title{font-size:20px;font-weight:900;color:var(--dark);margin-bottom:20px;}
  .modal-label{display:block;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
  .modal-field{margin-bottom:16px;}
  .color-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .color-swatch{width:34px;height:34px;border-radius:9px;cursor:pointer;border:3px solid transparent;}
  .color-swatch.selected{border-color:var(--dark);}
  .subject-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .subject-chip{padding:8px 14px;border-radius:12px;cursor:pointer;border:2px solid var(--border);background:#fff;font-size:13px;font-weight:700;color:#888;font-family:inherit;display:flex;align-items:center;gap:6px;}
  .subject-chip.selected{color:#fff;border-color:transparent;}
  .step-field{display:flex;gap:8px;margin-bottom:8px;}
  .step-field input{flex:1;margin:0;}
  .remove-step{padding:0 13px;border-radius:10px;border:2px solid #eee;background:#fff;color:var(--red);font-size:20px;cursor:pointer;line-height:1;}
  .add-step-btn{font-size:14px;color:var(--blue);font-weight:700;border:none;background:none;cursor:pointer;padding:4px 0;margin-bottom:16px;font-family:inherit;}
  .time-row{display:flex;gap:12px;}
  .time-row>div{flex:1;}
  #sync-bar{background:#fff;border-top:2px solid var(--border);padding:10px 16px calc(var(--safe-bot) + 10px);display:flex;align-items:center;gap:10px;flex-shrink:0;}
  #sync-status{font-size:12px;color:var(--muted);font-weight:600;flex:1;}
  .empty{text-align:center;padding:60px 20px;color:#ccc;}
  .empty-icon{font-size:48px;margin-bottom:10px;}
  .empty-title{font-size:18px;font-weight:700;margin-bottom:6px;color:#bbb;}
  .empty-sub{font-size:14px;}
  .pill{display:inline-block;border-radius:99px;padding:3px 10px;font-size:12px;font-weight:800;margin-left:8px;}
  /* Recording indicator */
  .rec-indicator{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--red);margin-right:6px;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  /* Points */
  .points-bar{background:linear-gradient(135deg,#1a1a2e,#2d2d5e);border-radius:18px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;color:#fff;}
  .points-total{font-size:48px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;color:#FFD700;}
  .points-label{font-size:12px;font-weight:800;color:rgba(255,255,255,0.6);letter-spacing:1.5px;text-transform:uppercase;}
  .points-today{font-size:22px;font-weight:800;color:#5BF5A0;}
  .point-pop{position:fixed;pointer-events:none;font-size:28px;font-weight:900;color:#FFD700;text-shadow:0 2px 8px rgba(0,0,0,0.3);z-index:999;animation:pointPop 1.2s ease-out forwards;}
  @keyframes pointPop{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-80px) scale(1.4);}}
  .bonus-flash{background:#FFD700;border-radius:14px;padding:10px 16px;text-align:center;font-size:17px;font-weight:900;color:#1a1a2e;margin-bottom:14px;animation:bonusFade 3s ease-out forwards;}
  @keyframes bonusFade{0%,50%{opacity:1;}100%{opacity:0;}}
  @media(min-width:600px){
    #content{padding:22px 24px calc(var(--safe-bot) + 24px);}
    #clock{font-size:52px;}
    .block-title{font-size:22px;}
    .step-label{font-size:18px;}
    #timer-display{font-size:90px;}
  }
</style>
</head>

let tokenClient;
function initGoogleAuth(){
  if(typeof google==="undefined") return;
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback:(resp)=>{

}
async function fetchUserEmail(){
  try{

    const d=await r.json();
    G.userEmail=d.email||"";

    setSyncStatus(`已登入 ${G.userEmail}`);

}

// ═══ DRIVE HELPERS ═══════════════════════════════════════════════════════
async function ensureFolder(){
  if(G.driveFolderId) return G.driveFolderId;
  // search
  const q=encodeURIComponent(`name='${DRIVE_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:`Bearer ${G.accessToken}`}});
  const d=await r.json();
  if(d.files&&d.files.length>0){G.driveFolderId=d.files[0].id;lsSet(K.folderId,G.driveFolderId);return G.driveFolderId;}
  // create
  const c=await fetch("https://www.googleapis.com/drive/v3/files",{
    method:"POST",headers:{Authorization:`Bearer ${G.accessToken}`,"Content-Type":"application/json"},
    body:JSON.stringify({name:DRIVE_FOLDER,mimeType:"application/vnd.google-apps.folder"})
  });
  const cd=await c.json();
  G.driveFolderId=cd.id;lsSet(K.folderId,G.driveFolderId);return G.driveFolderId;
}

async function uploadToDrive(blob,filename,mimeType,subFolderName){
  if(!G.accessToken) throw new Error("未登入");
  const parentId=await ensureFolder();
  // ensure date subfolder
  let dateId;
  const q=encodeURIComponent(`name='${subFolderName}' and '${parentId}' in parents and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:`Bearer ${G.accessToken}`}});
  const rd=await r.json();
  if(rd.files&&rd.files.length>0){dateId=rd.files[0].id;}
  else{
    const c=await fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",headers:{Authorization:`Bearer ${G.accessToken}`,"Content-Type":"application/json"},
      body:JSON.stringify({name:subFolderName,mimeType:"application/vnd.google-apps.folder",parents:[parentId]})
    });
    dateId=(await c.json()).id;
  }
  // upload
  const meta=JSON.stringify({name:filename,parents:[dateId]});
  const form=new FormData();
  form.append("metadata",new Blob([meta],{type:"application/json"}));
  form.append("file",blob);
  const up=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink",{
    method:"POST",headers:{Authorization:`Bearer ${G.accessToken}`},body:form
  });
  return await up.json();
}

// dataUrl -> blob
function dataUrlToBlob(dataUrl){
  const [header,data]=dataUrl.split(",");
  const mime=header.match(/:(.*?);/)[1];
  const bin=atob(data);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

// compress image
async function compressImage(file,maxW=1200){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement("canvas");
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      c.toBlob(b=>res(b),"image/jpeg",0.82);
    };
    img.src=url;
  });
}

// ═══ MEDIA HANDLERS ══════════════════════════════════════════════════════
async function handleImageFile(file,blockId){
  setStatus(blockId,"壓縮中…");
  const compressed=await compressImage(file);
  const reader=new FileReader();
  reader.onload=()=>{
    if(!G.pendingUploads[blockId]) G.pendingUploads[blockId]=[];
    const ts=new Date().toTimeString().slice(0,5).replace(":","");
    G.pendingUploads[blockId].push({type:"image",dataUrl:reader.result,name:`照片_${todayStr()}_${ts}.jpg`,blob:compressed});
    setStatus(blockId,"照片已暫存，按「存進歷程」上傳");
    render();
  };
  reader.readAsDataURL(compressed);
}

async function handleVideoFile(file,blockId){
  setStatus(blockId,"影片處理中…");
  const reader=new FileReader();
  reader.onload=()=>{
    if(!G.pendingUploads[blockId]) G.pendingUploads[blockId]=[];
    const ts=new Date().toTimeString().slice(0,5).replace(":","");
    G.pendingUploads[blockId].push({type:"video",dataUrl:reader.result,name:`影片_${todayStr()}_${ts}.mp4`,blob:file});
    setStatus(blockId,"影片已暫存，按「存進歷程」上傳");
    render();
  };
  reader.readAsDataURL(file);
}

async function startRecording(blockId){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    G.audioChunks=[];
    G.mediaRecorder=new MediaRecorder(stream);
    G.isRecording=true;
    G.recordingBlockId=blockId;
    G.mediaRecorder.ondataavailable=e=>{if(e.data.size>0) G.audioChunks.push(e.data);};
    G.mediaRecorder.onstop=()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(G.audioChunks,{type:"audio/mp4"});
      const reader=new FileReader();
      const ts=new Date().toTimeString().slice(0,5).replace(":","");
      reader.onload=()=>{
        if(!G.pendingUploads[blockId]) G.pendingUploads[blockId]=[];
        G.pendingUploads[blockId].push({type:"audio",dataUrl:reader.result,name:`錄音_${todayStr()}_${ts}.m4a`,blob});
        G.isRecording=false;G.recordingBlockId=null;
        setStatus(blockId,"錄音完成，按「存進歷程」上傳");
        render();
      };
      reader.readAsDataURL(blob);
    };
    G.mediaRecorder.start();
    render(); // show stop button
  }catch(e){setStatus(blockId,"無法使用麥克風："+e.message);}
}

function stopRecording(){
  if(G.mediaRecorder&&G.mediaRecorder.state!=="inactive") G.mediaRecorder.stop();
}

// ═══ SAVE BLOCK ENTRY ════════════════════════════════════════════════════
async function saveBlockEntry(blockId){
  const dow=new Date().getDay();
  const blk=(G.schedule[dow]||[]).find(b=>b.id===blockId);
  const subj=blk?getSub(blk.subjectId):null;
  const noteText=((G.blockNotes||{})[blockId]||"").trim();
  const pending=G.pendingUploads[blockId]||[];

  if(!noteText&&pending.length===0){setStatus(blockId,"請先輸入文字或新增媒體");return;}

  setStatus(blockId,"儲存中…");
  const media=[];

  // Upload each pending file
  for(const item of pending){
    if(G.accessToken){
      try{
        const result=await uploadToDrive(item.blob,item.name,item.blob.type,todayStr());
        media.push({type:item.type,dataUrl:item.type==="image"?item.dataUrl:"",driveUrl:result.webViewLink,driveName:item.name});
      }catch(e){
        media.push({type:item.type,dataUrl:item.dataUrl});
        setStatus(blockId,"⚠ 上傳失敗，已存本機："+e.message);
      }
    } else {
      // store locally only (audio/image dataUrl) — skip large videos
      if(item.type!=="video") media.push({type:item.type,dataUrl:item.dataUrl});
      else media.push({type:"video",dataUrl:"",note:"（影片未登入，未儲存）"});
    }
  }

  const entry={
    date:todayStr(),
    subjectId:subj?.id||"free",
    subject:subj?.label||"自由探索",
    emoji:subj?.emoji||"📝",
    note:noteText,
    media,
  };
  G.records=[entry,...G.records].slice(0,500);
  lsSet(K.records,G.records);
  G.pendingUploads[blockId]=[];
  if(!G.blockNotes) G.blockNotes={};
  G.blockNotes[blockId]="";
  setStatus(blockId,G.accessToken?"✓ 已存進歷程並上傳 Drive！":"✓ 已存進歷程（本機）");
  setTimeout(()=>setStatus(blockId,""),3000);
  render();
  // 自動靜默備份
  if(G.accessToken) driveBackupSilent();
}

// ═══ TASK TOGGLE ═════════════════════════════════════════════════════════
function calcTodayPoints(){
  const dow=new Date().getDay();
  const blocks=G.schedule[dow]||[];
  return blocks.reduce((a,b)=>{const ts=G.taskMap[b.id]||[];return a+ts.filter(Boolean).length;},0);
}

function addPoints(delta,reason,el){
  G.totalPoints=Math.max(0,G.totalPoints+delta);
  lsSet(K.totalPoints,G.totalPoints);
  G.pointsLog=[{date:todayStr(),reason,delta},...G.pointsLog].slice(0,500);
  lsSet(K.pointsLog,G.pointsLog);
  // floating +1 animation
  if(delta>0 && el){
    const rect=el.getBoundingClientRect();
    const pop=document.createElement("div");
    pop.className="point-pop";
    pop.textContent="⭐ +"+delta;
    pop.style.left=(rect.left+rect.width/2-20)+"px";
    pop.style.top=(rect.top-10)+"px";
    document.body.appendChild(pop);
    setTimeout(()=>pop.remove(),1300);
  }
}

function checkDayBonus(){
  const dow=new Date().getDay();
  const blocks=(G.schedule[dow]||[]);
  if(blocks.length===0) return;
  const total=blocks.reduce((a,b)=>{const s=getSub(b.subjectId);return a+(s?s.steps.length:0);},0);
  const done=blocks.reduce((a,b)=>{const ts=G.taskMap[b.id]||[];return a+ts.filter(Boolean).length;},0);
  if(total>0 && done===total && !lsGet(K.dayBonus(todayStr()),false)){
    lsSet(K.dayBonus(todayStr()),true);
    addPoints(5,"今天全部完成！",null);
    // show bonus flash
    const flash=document.createElement("div");
    flash.className="bonus-flash";
    flash.textContent="🎉 全部完成！額外 +5 點！";
    const content=document.getElementById("content");
    if(content) content.insertBefore(flash,content.firstChild);
    setTimeout(()=>flash.remove(),3000);
  }
}

function toggleStep(blockId,idx){
  if(!G.taskMap[blockId]){
    const dow=new Date().getDay();
    const blk=(G.schedule[dow]||[]).find(b=>b.id===blockId);
    const subj=blk?getSub(blk.subjectId):null;
    G.taskMap[blockId]=subj?subj.steps.map(()=>false):[];
  }
  const wasChecked=G.taskMap[blockId][idx];
  G.taskMap[blockId][idx]=!wasChecked;
  lsSet(K.tasks(blockId),G.taskMap[blockId]);
  // points: +1 for check, -1 for uncheck
  const btn=document.querySelector(`[data-block="${blockId}"][data-idx="${idx}"]`);
  addPoints(wasChecked?-1:1, wasChecked?"取消步驟":"完成步驟", wasChecked?null:btn);
  render();
  if(!wasChecked) setTimeout(checkDayBonus,100);
}

// ═══ TIMER ═══════════════════════════════════════════════════════════════
function toggleTimer(){
  G.timerRunning=!G.timerRunning;
  if(G.timerRunning){
    G.timerInterval=setInterval(()=>{
      G.timerSecs--;
      if(G.timerSecs<=0){
        clearInterval(G.timerInterval);G.timerRunning=false;
        G.timerPhase=G.timerPhase==="work"?"break":"work";
        G.timerSecs=G.timerPhase==="work"?G.workMins*60:G.breakMins*60;
      }
      updateTimerDisplay();
    },1000);
  } else clearInterval(G.timerInterval);
  render();
}
function resetTimer(){clearInterval(G.timerInterval);G.timerRunning=false;G.timerSecs=G.workMins*60;G.timerPhase="work";render();}
function updateTimerDisplay(){
  const mm=String(Math.floor(G.timerSecs/60)).padStart(2,"0");
  const ss=String(G.timerSecs%60).padStart(2,"0");
  const el=document.getElementById("timer-display");if(el) el.textContent=`${mm}:${ss}`;
  const total=G.timerPhase==="work"?G.workMins*60:G.breakMins*60;
  const pct=((total-G.timerSecs)/total)*100;
  const fill=document.querySelector("#content .prog-bar-fill");if(fill) fill.style.width=pct+"%";
}

// ═══ DRIVE BACKUP / RESTORE ══════════════════════════════════════════════
async function getDriveBackupId(){
  const pid=await ensureFolder();
  const q=encodeURIComponent(`name='${DRIVE_BACKUP}' and '${pid}' in parents and trashed=false`);
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`,{headers:{Authorization:`Bearer ${G.accessToken}`}});
  const d=await r.json();return d.files?.[0]?.id||null;
}
// 把備份檔設成「知道連結的人都可檢視」，這樣 Xavier 的裝置不用登入也能讀取
async function makeFilePublic(fileId){
  try{
    await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions`,{
      method:"POST",
      headers:{Authorization:`Bearer ${G.accessToken}`,"Content-Type":"application/json"},
      body:JSON.stringify({role:"reader",type:"anyone"})
    });
  }catch(e){console.warn("設定公開連結失敗",e);}
}

async function driveBackup(){
  if(!G.accessToken){alert("請先登入 Google");return;}
  setSyncStatus("備份中…");
  try{
    const payload=JSON.stringify({version:4,exportedAt:new Date().toISOString(),subjects:G.subjects,schedule:G.schedule,records:G.records,rituals:G.rituals},null,2);
    const parentId=await ensureFolder();
    let fileId=await getDriveBackupId();
    let isNewFile=false;
    if(!fileId){
      const m=await(await fetch("https://www.googleapis.com/drive/v3/files",{method:"POST",headers:{Authorization:`Bearer ${G.accessToken}`,"Content-Type":"application/json"},body:JSON.stringify({name:DRIVE_BACKUP,mimeType:"application/json",parents:[parentId]})})).json();
      fileId=m.id;isNewFile=true;
    }
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:"PATCH",headers:{Authorization:`Bearer ${G.accessToken}`,"Content-Type":"application/json"},body:payload});
    if(isNewFile) await makeFilePublic(fileId);
    lsSet("xv4_public_file_id",fileId);
    if(isNewFile && !PUBLIC_BACKUP_FILE_ID){
      setSyncStatus("✓ 已備份！請把這組 ID 告訴開發者填入程式：「"+fileId+"」");
      alert("第一次備份成功！\n\n為了讓 Xavier 的裝置不用登入也能同步課表，請把這組 ID 複製給我（負責設定工具的人），加進程式碼裡：\n\n"+fileId+"\n\n（這個視窗的文字可以長按複製）");
    } else {
      setSyncStatus("✓ 已備份  "+new Date().toLocaleTimeString());
    }
  }catch(e){setSyncStatus("備份失敗："+e.message);}
}

async function driveRestore(){
  if(!G.accessToken){alert("請先登入 Google");return;}
  if(!confirm("從 Drive 載入會覆蓋目前的科目和課表，確定嗎？")) return;
  setSyncStatus("載入中…");
  try{
    const fileId=await getDriveBackupId();
    if(!fileId){setSyncStatus("Drive 上找不到備份");return;}
    const d=await(await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:`Bearer ${G.accessToken}`}})).json();
    if(d.subjects){G.subjects=d.subjects;lsSet(K.subjects,G.subjects);}
    if(d.schedule){G.schedule=d.schedule;lsSet(K.schedule,G.schedule);}
    if(d.records){G.records=d.records;lsSet(K.records,G.records);}
    if(d.rituals){G.rituals=d.rituals;lsSet(K.rituals,G.rituals);}
    setSyncStatus("✓ 已載入  "+new Date().toLocaleTimeString());
    render();
  }catch(e){setSyncStatus("載入失敗："+e.message);}
}

// ── 公開連結載入（給 Xavier 的裝置用，不需要登入）─────────────────────────
async function fetchPublicBackup(silent){
  const fileId=PUBLIC_BACKUP_FILE_ID||lsGet("xv4_public_file_id",null);
  if(!fileId){
    if(!silent) setSyncStatus("尚未有公開備份，請家長先在自己的裝置上按「備份」");
    return false;
  }
  try{
    const r=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
    if(!r.ok) throw new Error("無法讀取（檔案可能還未設為公開）");
    const d=await r.json();
    if(d.subjects){G.subjects=d.subjects;lsSet(K.subjects,G.subjects);}
    if(d.schedule){G.schedule=d.schedule;lsSet(K.schedule,G.schedule);}
    if(d.records){G.records=d.records;lsSet(K.records,G.records);}
    if(d.rituals){G.rituals=d.rituals;lsSet(K.rituals,G.rituals);}
    setSyncStatus("✓ 已同步課表  "+new Date().toLocaleTimeString());
    render();
    return true;
  }catch(e){
    if(!silent) setSyncStatus("同步失敗："+e.message);
    return false;
  }
}

function setSyncStatus(msg){const el=document.getElementById("sync-status");if(el) el.textContent=msg;}

// 載入按鈕：已登入用完整 Drive 載入，未登入用公開連結同步
function handleRestoreClick(){
  if(G.accessToken) driveRestore();
  else fetchPublicBackup(false);
}

  const isNew=!blockId;
  const existing=!isNew?(G.schedule[dayIdx]||[]).find(b=>b.id===blockId):null;
  const blk=existing?{...existing}:{id:uid(),subjectId:G.subjects[0]?.id||"",label:"",startTime:"09:00",endTime:"11:00"};
  function html(){
    const sel=G.subjects.find(s=>s.id===blk.subjectId);
    return `<div class="modal-title">${DAY_ZH[dayIdx]}・${isNew?"新增課程":"編輯課程"}</div>
    <div class="modal-field"><label class="modal-label">選擇科目</label>
      <div class="subject-chips">${G.subjects.map(s=>`<button class="subject-chip${blk.subjectId===s.id?' selected':''}" data-sid="${s.id}" style="${blk.subjectId===s.id?`background:${s.color};border-color:${s.color}`:''}"> ${s.emoji} ${escHtml(s.label)}</button>`).join("")}</div>
    </div>
    <div class="modal-field"><label class="modal-label">顯示名稱（可留空）</label><input type="text" id="m-blabel" value="${escHtml(blk.label)}" placeholder="${escHtml(sel?.label||'')}"></div>
    <div class="time-row modal-field">
      <div><label class="modal-label">開始</label><input type="time" id="m-start" value="${blk.startTime}"></div>
      <div><label class="modal-label">結束</label><input type="time" id="m-end" value="${blk.endTime}"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn" id="mb-save" style="background:${sel?.color||'var(--blue)'};color:#fff">${isNew?"加入課表":"儲存"}</button>
      ${!isNew?`<button class="btn btn-outline" id="mb-del" style="color:var(--red);border-color:var(--red)">刪除課程</button>`:""}
    </div>`;}
  openModal(html());
  function bind(){
    document.querySelectorAll(".subject-chip").forEach(el=>{el.onclick=()=>{blk.subjectId=el.dataset.sid;openModal(html());bind();};});
    document.getElementById("mb-save").onclick=()=>{
      blk.label=document.getElementById("m-blabel").value.trim();
      blk.startTime=document.getElementById("m-start").value;
      blk.endTime=document.getElementById("m-end").value;
      const prev=G.schedule[dayIdx]||[];
      G.schedule[dayIdx]=isNew?[...prev,blk]:prev.map(b=>b.id===blk.id?blk:b);
      lsSet(K.schedule,G.schedule);closeModal();render();
    };
    const md=document.getElementById("mb-del");
    if(md) md.onclick=()=>{if(!confirm("確定刪除？")) return;G.schedule[dayIdx]=(G.schedule[dayIdx]||[]).filter(b=>b.id!==blockId);lsSet(K.schedule,G.schedule);closeModal();render();};
  }
  bind();
}

// ═══ UTILS ═══════════════════════════════════════════════════════════════
function escHtml(s=""){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function updateClock(){
  const n=new Date();
  const h=String(n.getHours()).padStart(2,"0"),m=String(n.getMinutes()).padStart(2,"0");
  const el=document.getElementById("clock");if(el) el.textContent=`${h}:${m}`;
  const dl=document.getElementById("date-label");if(dl) dl.textContent=`${DAY_ZH[n.getDay()]}・${todayStr()}`;
}
setInterval(updateClock,1000);updateClock();

// ═══ INIT ════════════════════════════════════════════════════════════════
window.addEventListener("load",()=>{
  setTimeout(initGoogleAuth,800);
  if(G.accessToken){
    setSyncStatus(`已登入 ${G.userEmail}`);
  } else {
    // Xavier 的裝置：未登入時自動嘗試從公開連結同步課表
    setSyncStatus("同步課表中…");
    fetchPublicBackup(true).then(ok=>{
      if(!ok) setSyncStatus("尚未連線課表，請聯絡家長備份");
    });
  }
});
// ── 一次性資料遷移 xv3 → xv4 ──────────────────────────────────────────
function migrateFromV3(){
  if(localStorage.getItem("xv4_migrated")) return;
  const map=[
    ["xv3_subjects","xv4_subjects"],
    ["xv3_schedule","xv4_schedule"],
    ["xv3_records","xv4_records"],
    ["xv3_rituals","xv4_rituals"],
    ["xv3_workMins","xv4_workMins"],
    ["xv3_breakMins","xv4_breakMins"],
  ];
  let moved=0;
  map.forEach(([from,to])=>{
    const v=localStorage.getItem(from);
    if(v&&!localStorage.getItem(to)){
      localStorage.setItem(to,v);
      moved++;
    }
  });
  // migrate daily tasks (xv3_tasks_YYYY-MM-DD_blockId -> xv4_...)
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("xv3_tasks_")){
      const newKey=k.replace("xv3_tasks_","xv4_tasks_");
      if(!localStorage.getItem(newKey)) localStorage.setItem(newKey,localStorage.getItem(k));
      moved++;
    }
    if(k&&k.startsWith("xv3_one_")){
      const newKey=k.replace("xv3_one_","xv4_one_");
      if(!localStorage.getItem(newKey)) localStorage.setItem(newKey,localStorage.getItem(k));
      moved++;
    }
    if(k&&k.startsWith("xv3_note_")){
      const newKey=k.replace("xv3_note_","xv4_note_");
      if(!localStorage.getItem(newKey)) localStorage.setItem(newKey,localStorage.getItem(k));
      moved++;
    }
  }
  localStorage.setItem("xv4_migrated","1");
  if(moved>0) console.log("Migrated "+moved+" items from xv3 to xv4");
}

migrateFromV3();
loadAll();render();
</script>
